# Name of your application. Used to uniquely configure containers.
service: amandine_atelier

# Name of the container image (use your-user/app-name on external registries).
# ⚠️ REMPLACE amandinemonte par ton username Docker Hub
image: amandinemonte/amandine_atelier

# Deploy to these servers.
servers:
  web:
    - 162.19.220.33

# Enable SSL auto certification via Let's Encrypt.
# Requires config.assume_ssl + config.force_ssl in production.rb (déjà activé).
proxy:
  ssl: true
  host: amandineatelierdigital.fr

# Where you keep your container images.
registry:
  server: registry-1.docker.io
  # ⚠️ REMPLACE amandinemonte par ton username Docker Hub
  username: amandinemonte
  password:
    - KAMAL_REGISTRY_PASSWORD

# Use ubuntu user (VPS OVH default avec clé SSH)
ssh:
  user: ubuntu

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - BREVO_SMTP_USER
    - BREVO_SMTP_PASSWORD
  clear:
    # Run the Solid Queue Supervisor inside the web server's Puma process to do jobs.
    SOLID_QUEUE_IN_PUMA: true

# Aliases are triggered with "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Persistent volume pour SQLite + Active Storage local.
# ⚠️ critique : sans ce volume, toutes les données disparaissent à chaque deploy.
volumes:
  - "amandine_atelier_storage:/rails/storage"

# Bridge fingerprinted assets entre versions pour éviter 404 in-flight.
asset_path: /rails/public/assets

# Configure the image builder.
# provenance/sbom false : désactive les attestations buildx qui requièrent
# des permissions Docker Hub élargies et causaient des push deniés.
builder:
  arch: amd64
  provenance: false
  sbom: false
